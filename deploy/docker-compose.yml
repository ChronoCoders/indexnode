version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: indexnode
      POSTGRES_USER: indexnode
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexnode"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: postgresql://indexnode:${POSTGRES_PASSWORD}@postgres:5432/indexnode
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL}
      CREDIT_CONTRACT_ADDRESS: ${CREDIT_CONTRACT_ADDRESS}
      CREDIT_PRIVATE_KEY: ${CREDIT_PRIVATE_KEY}
      MARKETPLACE_CONTRACT_ADDRESS: ${MARKETPLACE_CONTRACT_ADDRESS}
      TIMESTAMP_REGISTRY_ADDRESS: ${TIMESTAMP_REGISTRY_ADDRESS}
      IPFS_API_URL: ${IPFS_API_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      BASE_URL: ${BASE_URL:-https://indexnode.io}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://indexnode.io}
      SERVE_FRONTEND: ${SERVE_FRONTEND:-true}
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    # Reload nginx every 12 hours so renewed certs are picked up automatically
    command: >
      sh -c "while :; do sleep 43200 && nginx -s reload; done &
             nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run renewal check every 12 hours; exits 0 if cert is not yet due
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
               sleep 43200 & wait $${!};
             done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
