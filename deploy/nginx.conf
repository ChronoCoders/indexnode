upstream indexnode_api {
    least_conn;
    server api:8080 max_fails=3 fail_timeout=30s;
}

# ── HTTP — redirect to HTTPS + ACME challenge ──────────────────────────────
server {
    listen 80;
    server_name indexnode.io www.indexnode.io;

    # Let's Encrypt ACME challenge (used by certbot for renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name indexnode.io www.indexnode.io;

    # TLS certificates — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/indexnode.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/indexnode.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    client_max_body_size 10M;
    client_body_timeout  60s;

    # Block Prometheus metrics from the public internet
    location /metrics {
        deny all;
        return 403;
    }

    # Health check — no access log noise
    location = /health {
        proxy_pass http://indexnode_api/health;
        access_log off;
    }

    # GraphQL WebSocket subscriptions — long-lived connections
    location /graphql/ws {
        proxy_pass         http://indexnode_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Everything else → API
    location / {
        proxy_pass         http://indexnode_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
